name: club_server
description: club API server with static file serving.
version: 0.1.0
homepage: https://club.birju.dev
repository: https://github.com/BirjuVachhani/club
issue_tracker: https://github.com/BirjuVachhani/club/issues
publish_to: none

environment:
  sdk: ^3.11.0

resolution: workspace

dependencies:
  club_core:
    path: ../club_core
  club_db:
    path: ../club_db
  club_storage:
    path: ../club_storage
  club_storage_s3:
    path: ../club_storage_s3
  club_storage_firebase:
    path: ../club_storage_firebase
  club_package_reader:
    path: ../club_package_reader
  club_indexed_blob:
    path: ../club_indexed_blob
  shelf: ^1.4.2
  shelf_router: ^1.1.4
  shelf_static: ^1.1.3
  dart_jsonwebtoken: ^3.4.0
  bcrypt: ^1.2.0
  uuid: ^4.5.3
  yaml: ^3.1.3
  logging: ^1.3.0
  args: ^2.7.0
  mime: ^2.0.0
  markdown: ^7.3.1
  tar: ^2.0.2
  archive: ^4.0.9
  barbecue: ^0.5.0
  crypto: ^3.0.7
  cron: ^0.6.2
  image: ^4.8.0
  pana: ^0.23.12
  path: ^1.9.1
  html: ^0.15.4
  pub_semver: ^2.1.4

dev_dependencies:
  lints: ^6.1.0
  test: ^1.31.0
